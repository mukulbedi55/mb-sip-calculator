<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>MB Smart SIP Calculator</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head><body>
<div class="sidebar"><h2>MB Finance</h2><ul><li>SIP ✔</li><li>SWP (Soon)</li><li>FD (Soon)</li><li>RD (Soon)</li><li>Loan EMI (Soon)</li></ul></div>
<div class="main"><h1>MB Smart SIP Calculator</h1>
<label>Monthly SIP</label><input id="sip" type="number" value="5000">
<label>Return %</label><input id="rate" type="number" value="12">
<label>Years</label><input id="years" type="number" value="20">
<button onclick="calculate()">Calculate</button>
<div class="card">
<p>Investment: <span id="inv"></span></p>
<p>Returns: <span id="ret"></span></p>
<p>Total: <span id="tot"></span></p>
</div>
<canvas id="c"></canvas>
</div>
<script src="script.js"></script></body></html>
